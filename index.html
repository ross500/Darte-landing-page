<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARTE — Your AI concierge for real-world experiences</title>

<link rel="stylesheet" href="satoshi.css">

<style>
  /* ============================================================
     DARTE Design System — tokens (colors, type, spacing)
     ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=Spline+Sans+Mono:wght@400;500;600&display=swap');

  :root {
    /* ---- Brand core (raw, exact) ---- */
    --darte-green:        #15BF00;
    --darte-green-bright: #2BE015;
    --darte-green-deep:   #0E8A00;
    --darte-gold:         #FCCD3C;
    --darte-gold-deep:    #D9A916;
    --darte-aqua:         #00F5FF;
    --darte-aqua-deep:    #00C2CC;
    --darte-charcoal:     #000919;
    --darte-charcoal-2:   #05112A;
    --darte-ink:          #000410;

    --cat-dining:         #15BF00;
    --cat-attractions:    #21B8FF;
    --cat-reservations:   #FF7A1A;
    --cat-transportation: #00E0C6;
    --cat-entertainment:  #C24DFF;
    --cat-hotels:         #A8E63A;

    --gradient-brand:   linear-gradient(100deg, #0E8A00 0%, #15BF00 45%, #2BE015 100%);
    --gradient-rainbow: linear-gradient(90deg, #15BF00 0%, #00E0C6 28%, #21B8FF 50%, #C24DFF 72%, #FF7A1A 100%);

    --bg-base:        var(--darte-charcoal);
    --bg-sunken:      #00040e;
    --surface-1:      #071531;
    --surface-2:      #0D1E3F;
    --surface-3:      #14294F;

    --border-subtle:  #ffffff14;
    --border-default: #ffffff24;
    --border-strong:  #ffffff40;

    --text-strong:    #f2f6ff;
    --text-body:      #d0dae8;
    --text-muted:     #8b9ab2;
    --text-faint:     #5c6a83;
    --text-on-brand:  #041400;
    --text-on-accent: #00201f;

    --brand:          var(--darte-green);
    --brand-hover:    var(--darte-green-bright);
    --brand-press:    var(--darte-green-deep);
    --accent:         var(--darte-aqua);
    --accent-hover:   #4dfaff;
    --accent-press:   var(--darte-aqua-deep);
    --highlight:      var(--darte-gold);

    --shadow-md: 0 4px 16px #00000099, 0 1px 3px #00000066;
    --shadow-glow-green: 0 0 0 1px #2BE01540, 0 8px 28px #15BF0047;

    --font-display: 'Saira Condensed', 'Arial Narrow', sans-serif;
    --font-body:    'Satoshi', system-ui, -apple-system, sans-serif;
    --font-mono:    'Spline Sans Mono', ui-monospace, 'SFMono-Regular', monospace;

    --text-lg:   400 18px/1.55 var(--font-body);
    --text-base: 400 16px/1.6  var(--font-body);
    --text-xl:   500 20px/1.5  var(--font-body);
    --label-sm: 700 12px/1 var(--font-display);

    --track-tight:   -0.01em;
    --track-eyebrow: 0.14em;

    --radius-md:  10px;
    --radius-lg:  16px;

    --ease-out:    cubic-bezier(0.22, 0.61, 0.36, 1);
    --ease-spring: cubic-bezier(0.34, 1.4, 0.5, 1);
    --dur-fast: 120ms;
    --dur-slow: 340ms;
  }
  ::selection { background: #00F5FF33; }
</style>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg-base); }
  body {
    background: transparent;
    color: var(--text-body);
    font: var(--text-base);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ambient interactive background canvas */
  #ambient {
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; display: block;
  }
  /* static neon grid that the cursor lights up (drawn crisp via CSS) */
  #ambient-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    --grid-line: rgba(255,255,255,.045);
    background-image:
      linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
    background-size: 48px 48px;
    -webkit-mask-image: radial-gradient(130% 130% at 50% 30%, #000 62%, transparent 100%);
    mask-image: radial-gradient(130% 130% at 50% 30%, #000 62%, transparent 100%);
  }

  /* ---- lifestyle photography treatment ---- */
  /* wrap gives the photo a brand color-grade + dark protection gradient so
     it reads as DARTE, not generic stock. overlay is click-through. */
  .photo-frame { position: relative; overflow: hidden; border-radius: 16px;
    border: 1px solid var(--border-subtle); background: var(--surface-1); }
  .photo-frame img { width: 100%; height: 100%; display: block; object-fit: cover; }
  .photo-frame::after { content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 3;
    background:
      linear-gradient(to top, color-mix(in srgb, var(--darte-charcoal) 92%, transparent) 4%, transparent 62%),
      linear-gradient(115deg, color-mix(in srgb, var(--grade, #15BF00) 30%, transparent), transparent 55%); }
  .photo-cap { position: absolute; left: 16px; bottom: 14px; z-index: 4; pointer-events: none;
    font: 800 15px/1 var(--font-display); font-style: italic; letter-spacing: .02em;
    text-transform: uppercase; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,.6); }

  /* ---- light interlude section (dark → light → dark rhythm) ---- */
  .sec-light { background: #eef2ee; }
  .sec-light .photo-frame { border-color: #00000014; }

  /* acronym colored initial: lift off dark card so green doesn't wash out */
  .acr-initial { text-shadow: 0 0 1px rgba(0,0,0,.85), 0 1px 2px rgba(0,0,0,.6), 0 0 16px currentColor; }
  @media (max-width: 680px) { #ambient-grid { background-size: 40px 40px; } }

  /* Force dark tokens inside product mockups (phones) regardless of page theme —
     the device screens are always a dark OLED surface. */
  .force-dark {
    --bg-base:#000919; --bg-sunken:#00040e;
    --surface-1:#071531; --surface-2:#0D1E3F; --surface-3:#14294F;
    --border-subtle:#ffffff14; --border-default:#ffffff24; --border-strong:#ffffff40;
    --text-strong:#f2f6ff; --text-body:#d0dae8; --text-muted:#8b9ab2; --text-faint:#5c6a83;
    --brand:#15BF00; --brand-hover:#2BE015; --accent:#00F5FF; --highlight:#FCCD3C;
  }
  img { display: block; max-width: 100%; }

  /* ---- shared layout ---- */
  .wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 32px; }
  .display { font-family: var(--font-display); font-style: italic; font-weight: 900;
    letter-spacing: var(--track-tight); text-transform: none; }
  .eyebrow { font: var(--label-sm); font-style: italic; letter-spacing: var(--track-eyebrow);
    text-transform: uppercase; color: var(--brand); display: inline-block; }

  /* section rhythm */
  section { position: relative; }
  .sec-pad { padding: clamp(72px, 11vw, 148px) 0; }

  /* atmospheric glows — brighter, lit-up (dark mode leans into the neon) */
  .glow-green, .glow-aqua, .glow-orange { position: absolute; border-radius: 50%; filter: blur(86px);
    pointer-events: none; opacity: .78; z-index: 0; mix-blend-mode: screen; }
  .glow-orange { background: var(--cat-reservations); }

  a { color: inherit; text-decoration: none; }

  /* nav */
  .nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px);
    background: color-mix(in srgb, var(--bg-base) 72%, transparent);
    border-bottom: 1px solid var(--border-subtle);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between;
    height: 68px; position: relative; }
  .nav img { height: 42px; width: auto; }
  @media (max-width: 680px) { .nav img { height: 34px; } }

  /* ---- sticky "Coming Soon" badge — centered in the nav, brand orange ---- */
  .soon-badge {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    display: inline-flex; align-items: center; gap: 10px; z-index: 60;
    padding: 12px 24px; border-radius: 999px;
    font: 900 clamp(15px, 1.9vw, 21px)/1 var(--font-display); font-style: italic;
    letter-spacing: .08em; text-transform: uppercase; color: #1a0a00; white-space: nowrap;
    background: linear-gradient(100deg, #FFB43C 0%, #FF7A1A 55%, #F5361E 100%);
    box-shadow: 0 0 0 1px #ffb43c66, 0 8px 30px -6px #ff7a1aaa, 0 0 40px -10px #ff7a1a;
  }
  .soon-badge .soon-dot { width: 10px; height: 10px; border-radius: 50%; background: #1a0a00; flex-shrink: 0; }
  @media (max-width: 720px) {
    .soon-badge { padding: 8px 15px; letter-spacing: .04em; gap: 7px; }
    .nav img { max-width: 96px; }
  }

  /* ---- converging apps graphic responsive swap ---- */
  @media (max-width: 720px) {
    .converge-desktop { display: none !important; }
    .converge-mobile { display: flex !important; }
  }

  /* fade-up on scroll */
  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s var(--ease-out), transform .7s var(--ease-out); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; } }

  #darte-root { position: relative; z-index: 1; }

  /* chat typing animation */
  .caret { animation: blink 1s steps(1) infinite; font-weight: 400; }
  @keyframes blink { 50% { opacity: 0; } }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); display: inline-block;
    animation: bounce 1.1s var(--ease-out) infinite; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: .5; } 30% { transform: translateY(-5px); opacity: 1; } }
  .reply-in { animation: replyIn .45s var(--ease-spring); }
  @keyframes replyIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* responsive */
  @media (min-width: 900px) { .acr-sub { display: block !important; } }
  @media (max-width: 680px) { .what-photos { grid-template-columns: 1fr !important; } .what-photos .photo-frame { height: 200px !important; } }
  @media (max-width: 860px) {
    #sol-grid { grid-template-columns: 1fr !important; }
    #pro-grid { grid-template-columns: 1fr !important; }
    #sol-grid > div:last-child, #pro-grid > div:first-child { order: -1; }
  }
  @media (max-width: 680px) {
    .wrap { padding: 0 20px; }
    .prob-grid { grid-template-columns: 1fr !important; }
    .prob-arrow { transform: rotate(90deg); margin: 4px auto; }
  }
  @media (prefers-reduced-motion: reduce) {
    .dot, .reply-in, .caret { animation: none !important; }
  }
</style>
</head>
<body>
<div id="ambient-grid" aria-hidden="true"></div>
<canvas id="ambient" aria-hidden="true"></canvas>
<div id="darte-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="ambient.js"></script>

<script type="text/babel" src="phones.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
